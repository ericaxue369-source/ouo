    excellentReason:"",
    nextInterviewAdvice:"",
    dimensions:[
      {name:"岗位理解",grade:total>=82?"A":"B",reason:`候选人在回答${c.job}相关问题时，能够说明自己对岗位职责和业务目标的理解，并尝试把过往经历与当前岗位连接起来。这反映出候选人具备一定的角色意识和问题拆解能力。与 CEO 理想画像中“能快速理解业务、主动推进关键事项”的要求相比，候选人已经部分满足。不同之处在于，他对公司当前阶段的关键矛盾和资源约束讲得还不够细，需要进一步确认能否适应早期团队节奏。`},

      {name:"结果意识",grade:total>=88?"A":total>=78?"B":"C",reason:"候选人能提到项目成果，但对核心指标、验证方式和业务收益的呈现还不够充分。这说明他有结果导向的意识，但证据链还不够完整。CEO 曾强调理想候选人需要能对目标负责、能用数据判断方案效果，候选人在这一点上部分满足。后续需要追问具体指标口径、项目上线后的变化，以及候选人本人对结果负责到什么程度。"},

    React.createElement(PhoneInstance, {key:"c2",start:"contacts",label:"② 通讯录·候选人排序+Badge",isCeoView:true,...commonProps}),
    React.createElement(PhoneInstance, {key:"c3",start:"explore",label:"③ 探索页",isCeoView:true,...commonProps}),
    React.createElement(PhoneInstance, {key:"c4",start:"avatar",label:"④ AI分身",isCeoView:true,...commonProps}),
  ];

  const ToggleBtn = (val, label) => React.createElement("button", {
    key:val,
    onClick:()=>setRole(val),
    style:{
      border:"none", cursor:"pointer", padding:"9px 26px", fontSize:14, fontWeight:700,
      borderRadius:999, transition:"all .2s",
      background: role===val ? (val==="user"?"linear-gradient(135deg,#8b5cf6,#ec4899)":"linear-gradient(135deg,#f97316,#ec4899)") : "rgba(255,255,255,.7)",
      color: role===val ? "#fff" : "#888",
      boxShadow: role===val ? "0 4px 14px rgba(0,0,0,.12)" : "none",
    }
  }, label);

  return React.createElement("div", {style:{minHeight:"100vh",background:theme.bg,display:"flex",flexDirection:"column",alignItems:"center",padding:"24px 16px 60px",fontFamily:"'PingFang SC','Noto Sans SC',-apple-system,sans-serif",transition:"background .3s"}},
    React.createElement("div", {style:{display:"inline-flex",gap:8,background:"rgba(255,255,255,.45)",border:"1px solid rgba(0,0,0,.05)",borderRadius:999,padding:5,marginBottom:18,boxShadow:"0 2px 10px rgba(0,0,0,.05)"}},
      ToggleBtn("user","普通用户"),
      ToggleBtn("ceo","CEO用户")
    ),
    React.createElement("div", {style:{textAlign:"center",marginBottom:12}},
      React.createElement("div", {style:{display:"inline-flex",alignItems:"center",gap:6,background:"rgba("+theme.accentRgb+",.08)",border:"1px solid rgba("+theme.accentRgb+",.2)",borderRadius:999,padding:"4px 14px",fontSize:12,fontWeight:600,color:theme.accent,marginBottom:12}}, theme.eyebrow),
      React.createElement("h1", {style:{fontSize:20,fontWeight:900,color:"#4a3880",marginBottom:4,letterSpacing:"-.3px"}}, theme.title),
      React.createElement("p", {style:{fontSize:12,color:"#aaa"}}, "iPhone 16 Pro · 393×852pt · 点击手机内容开始交互")
    ),
    React.createElement("div", {style:{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center",marginBottom:28}},
      theme.chips.map(([icon,label]) =>
        React.createElement("div", {key:label,style:{background:"rgba(255,255,255,.85)",borderRadius:999,padding:"4px 12px",fontSize:11,color:"#555",border:"1px solid rgba("+theme.accentRgb+",.15)"}}, icon+" "+label)
      )
    ),
    React.createElement("div", {style:{display:"flex",gap:20,flexWrap:"wrap",justifyContent:"center",alignItems:"flex-start"}},
      isUser ? userPhones : ceoPhones
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
